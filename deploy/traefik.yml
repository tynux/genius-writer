# Traefik配置
# 用于ageniuswriter.com域名自动SSL

api:
  dashboard: true
  debug: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

serversTransport:
  insecureSkipVerify: true

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: geniuswriter-network

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@ageniuswriter.com
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO
  filePath: /var/log/traefik/traefik.log

accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100

# 中间件配置
http:
  middlewares:
    # 安全头部
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        sslRedirect: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"
    
    # 压缩
    compress:
      compress: true
    
    # 速率限制
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

# 全局配置
global:
  checkNewVersion: false
  sendAnonymousUsage: false