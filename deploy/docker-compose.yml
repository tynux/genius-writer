# GeniusWriter Docker Compose配置
# 部署到ageniuswriter.com

version: '3.8'

services:
  # 主应用服务
  app:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    container_name: geniuswriter-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=sqlite:////app/data/genius_writer.db
      - UPLOAD_FOLDER=/app/uploads
      - MAX_CONTENT_LENGTH=16777216
      - DEBUG=False
    env_file:
      - ../.env
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - app_uploads:/app/uploads
    networks:
      - geniuswriter-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geniuswriter.rule=Host(`ageniuswriter.com`) || Host(`www.ageniuswriter.com`)"
      - "traefik.http.routers.geniuswriter.entrypoints=websecure"
      - "traefik.http.routers.geniuswriter.tls.certresolver=letsencrypt"
      - "traefik.http.services.geniuswriter.loadbalancer.server.port=8000"

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: geniuswriter-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl
      - ../static:/var/www/static:ro
      - ../uploads:/var/www/uploads:ro
    depends_on:
      - app
    networks:
      - geniuswriter-network
    labels:
      - "traefik.enable=false"

  # Redis缓存（可选，用于Celery任务队列）
  redis:
    image: redis:alpine
    container_name: geniuswriter-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - geniuswriter-network
    command: redis-server --appendonly yes

  # Traefik反向代理（推荐用于生产环境）
  traefik:
    image: traefik:v3.0
    container_name: geniuswriter-traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./acme:/etc/traefik/acme
    networks:
      - geniuswriter-network
    labels:
      - "traefik.enable=true"

volumes:
  app_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  redis_data:
    driver: local

networks:
  geniuswriter-network:
    driver: bridge
    name: geniuswriter-network

# 部署命令：
# 1. 复制.env.example为.env并配置
# 2. docker-compose -f deploy/docker-compose.yml up -d
# 3. 访问 https://ageniuswriter.com